<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行社推荐 - 贵州旅游网</title>
  <meta name="description" content="贵州旅游网精选优质旅行社推荐，真实评测与选择指南。">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏔️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #006944;
      --primary-light: #00956d;
      --primary-dark: #004d33;
      --secondary: #ffb300;
      --accent: #e65100;
      --dark: #1a1a1a;
      --light: #fafafa;
      --white: #ffffff;
      --gray: #555;
      --gray-light: #888;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
      --shadow: 0 4px 20px rgba(0,0,0,0.1);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.15);
      --radius: 16px;
      --radius-sm: 8px;
      --transition: 0.25s ease;
    }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--light);
      color: var(--dark);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 1000px; margin: 0 auto; padding: 0 24px; }

    header {
      background: var(--white);
      color: var(--dark);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
      border-bottom: 1px solid #eee;
    }
    header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
    }
    .logo svg { width: 36px; height: 36px; }
    nav ul {
      display: flex;
      list-style: none;
      gap: 32px;
    }
    nav a {
      color: var(--dark);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 8px 4px;
      border-bottom: 2px solid transparent;
      transition: var(--transition);
    }
    nav a:hover {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    nav a.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .page-header {
      background: linear-gradient(160deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 60px 0;
      text-align: center;
    }
    .page-header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .page-header p {
      font-size: 1rem;
      opacity: 0.9;
    }

    .article-list {
      padding: 48px 0 80px;
    }
    .article-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      cursor: pointer;
    }
    .article-card:hover {
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }
    .article-meta {
      font-size: 0.85rem;
      color: var(--gray-light);
      margin-bottom: 10px;
    }
    .article-card h2 {
      font-size: 1.25rem;
      color: var(--dark);
      margin-bottom: 10px;
      font-weight: 600;
    }
    .article-card h2 a {
      color: inherit;
      text-decoration: none;
    }
    .article-card h2 a:hover {
      color: var(--primary);
    }
    .article-excerpt {
      color: var(--gray);
      font-size: 0.95rem;
      line-height: 1.7;
    }
    .article-tags {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag {
      background: #f0f0f0;
      color: var(--gray);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    .empty-state {
      text-align: center;
      padding: 80px 0;
      color: var(--gray);
    }
    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.4;
    }
    .empty-state h3 {
      font-size: 1.2rem;
      margin-bottom: 8px;
      color: var(--dark);
    }

    footer {
      background: var(--dark);
      color: white;
      text-align: center;
      padding: 24px 0;
      font-size: 0.9rem;
    }
    footer p { opacity: 0.7; }

    @media (max-width: 768px) {
      header .container { flex-direction: column; gap: 12px; }
      nav ul { gap: 16px; flex-wrap: wrap; justify-content: center; }
      .page-header { padding: 40px 0; }
      .page-header h1 { font-size: 1.8rem; }
      .article-card { padding: 20px; }
    }
  </style>
</head>
<body>
  <header>

          <path d="M18 8l-8 7h5v13h6V15h5L18 8z" fill="#00956d"/>
        </svg>
        贵州旅游网

      <nav>
        <ul>
          <li><a href="index.html">首页</a></li>

          <li><a href="index.html#agencies">精选旅行社</a></li>
          <li><a href="index.html#contact">联系我们</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="page-header">
    <div class="container">
      <h1>旅行社推荐</h1>
      <p>精选优质旅行社，真实评测与选择指南</p>
    </div>
  </section>

  <main class="article-list">
    <div class="container">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z" stroke="currentColor" stroke-width="1.5"/>
          <path d="M7 7h10M7 11h10M7 15h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <h3>文章即将上线</h3>
        <p>更多旅行社推荐内容正在整理中，敬请期待。</p>
      </div>

          <span class="tag">标签1</span>

  <footer>
    <div class="container">
      <p>贵州旅游网 · 官方合作平台</p>
    </div>
  </footer>
</body>
</html>
