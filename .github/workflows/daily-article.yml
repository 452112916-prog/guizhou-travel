name: 每日文章生成

on:
  schedule:
    # 每天早上8点、下午2点、晚上8点各发布一篇
    - cron: '0 0,6,12 * * *'
  workflow_dispatch:
    inputs:
      article_type:
        description: '文章类型'
        required: true
        default: 'b4'
        type: choice
        options:
          - b4
          - b5
          - b8

env:
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 生成文章
        run: node scripts/generate-article.mjs ${{ github.event.inputs.article_type || 'b4' }}

      - name: 提交文章
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'auto: 生成新文章 ${{ github.event.inputs.article_type || env.ARTICLE_TYPE }}'
          file_pattern: articles/
